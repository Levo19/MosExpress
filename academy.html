<title>ME Academy · Capacitación Día 1</title>
<style>
  :root{
    --bg:#0b1220; --bg2:#0e1526; --surf:#141d31; --surf2:#1b2740; --line:#26324b;
    --ink:#eaf1fb; --ink2:#9fb0c9; --ink3:#65758f;
    --brand:#10b981; --brand2:#34d399; --brandink:#052e22;
    --gold:#fbbf24; --gold2:#f59e0b;
    --rose:#f43f5e; --sky:#38bdf8; --violet:#a78bfa;
    --r:18px; --shadow:0 18px 46px rgba(0,0,0,.45);
    --coach:#fbbf24;
  }
  @media (prefers-color-scheme:light){
    :root{ --bg:#eef2f8; --bg2:#e6ecf5; --surf:#ffffff; --surf2:#f4f7fc; --line:#dce4f0;
      --ink:#0e1a2b; --ink2:#4a5b74; --ink3:#8494ac; --shadow:0 16px 40px rgba(20,40,80,.14); }
  }
  :root[data-theme="dark"]{ --bg:#0b1220; --bg2:#0e1526; --surf:#141d31; --surf2:#1b2740; --line:#26324b;
    --ink:#eaf1fb; --ink2:#9fb0c9; --ink3:#65758f; --shadow:0 18px 46px rgba(0,0,0,.45); }
  :root[data-theme="light"]{ --bg:#eef2f8; --bg2:#e6ecf5; --surf:#ffffff; --surf2:#f4f7fc; --line:#dce4f0;
    --ink:#0e1a2b; --ink2:#4a5b74; --ink3:#8494ac; --shadow:0 16px 40px rgba(20,40,80,.14); }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 700px at 80% -10%, rgba(16,185,129,.10), transparent 60%),
               radial-gradient(900px 600px at -10% 110%, rgba(251,191,36,.07), transparent 55%),
               var(--bg);
    color:var(--ink);
    font-family:'Segoe UI Variable Display','Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; min-height:100vh;
  }
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit}
  h1,h2,h3{margin:0;letter-spacing:-.02em;text-wrap:balance}

  /* ===== APP SHELL ===== */
  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:12px 18px;
    background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:17px;letter-spacing:-.02em}
  .logo .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--brand),var(--brand2));
    display:grid;place-items:center;font-size:16px;box-shadow:0 6px 16px rgba(16,185,129,.4)}
  .logo small{color:var(--ink3);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  .xpbar{flex:1;max-width:340px;height:12px;border-radius:99px;background:var(--surf2);overflow:hidden;border:1px solid var(--line)}
  .xpbar > i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--brand),var(--gold));transition:width .6s cubic-bezier(.2,.9,.3,1)}
  .xplbl{font-weight:800;font-size:12px;color:var(--gold);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .top .sp{flex:1}
  .icobtn{border:1px solid var(--line);background:var(--surf);color:var(--ink);width:38px;height:38px;border-radius:11px;cursor:pointer;font-size:16px}
  .icobtn:hover{background:var(--surf2)}

  .wrap{display:grid;grid-template-columns:290px 1fr;gap:22px;max-width:1180px;margin:0 auto;padding:22px 18px 60px}
  @media(max-width:860px){ .wrap{grid-template-columns:1fr;gap:14px} .side{order:2} }

  /* ===== SIDEBAR MAP ===== */
  .side{position:sticky;top:74px;align-self:start;background:var(--surf);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
  @media(max-width:860px){ .side{position:static} }
  .side h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin:2px 4px 12px}
  .mod{margin-bottom:6px;border-radius:14px;overflow:hidden;border:1px solid transparent}
  .mod-h{display:flex;align-items:center;gap:10px;padding:10px 10px;cursor:pointer;border-radius:12px}
  .mod-h:hover{background:var(--surf2)}
  .mod-ico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:17px;flex-shrink:0;background:var(--surf2)}
  .mod.on .mod-ico{background:linear-gradient(140deg,var(--brand),var(--brand2))}
  .mod-t{font-weight:800;font-size:14px;flex:1;min-width:0}
  .mod-t small{display:block;color:var(--ink3);font-weight:600;font-size:11px}
  .lessons{padding:2px 6px 8px 6px;display:none}
  .mod.open .lessons{display:block}
  .les{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink2)}
  .les:hover{background:var(--surf2);color:var(--ink)}
  .les.active{background:color-mix(in srgb,var(--brand) 16%,transparent);color:var(--ink)}
  .les .st{width:20px;height:20px;border-radius:99px;display:grid;place-items:center;font-size:11px;flex-shrink:0;
    background:var(--surf2);color:var(--ink3);border:1px solid var(--line)}
  .les.done .st{background:var(--brand);color:#042; border-color:transparent}
  .les.locked{opacity:.45;cursor:not-allowed}
  .les.locked:hover{background:transparent}

  /* ===== STAGE ===== */
  .stage{min-width:0}
  .card{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .lead{padding:22px 24px 4px}
  .eyebrow{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--brand2);
    background:color-mix(in srgb,var(--brand) 14%,transparent);padding:5px 11px;border-radius:99px}
  .lead h1{font-size:clamp(22px,4.2vw,30px);margin:14px 0 6px;font-weight:900}
  .why{display:flex;gap:10px;align-items:flex-start;background:color-mix(in srgb,var(--gold) 12%,transparent);
    border:1px solid color-mix(in srgb,var(--gold) 30%,transparent);border-radius:14px;padding:11px 14px;margin:10px 24px 0;color:var(--ink)}
  .why b{color:var(--gold2)}
  .body{padding:18px 24px 8px;font-size:15px;color:var(--ink2)}
  .body p{margin:0 0 12px} .body b{color:var(--ink)}
  .steplist{list-style:none;padding:0;margin:8px 0 0;display:grid;gap:8px}
  .steplist li{display:flex;gap:11px;align-items:flex-start;background:var(--surf2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;color:var(--ink)}
  .steplist .n{width:24px;height:24px;border-radius:8px;background:var(--brand);color:#042;font-weight:900;display:grid;place-items:center;flex-shrink:0;font-size:13px}

  /* ===== COACH ===== */
  .coach{display:flex;gap:12px;align-items:flex-start;margin:16px 24px;padding:14px 16px;border-radius:16px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 13%,var(--surf2)),var(--surf2));
    border:1px solid color-mix(in srgb,var(--gold) 34%,transparent)}
  .coach .face{font-size:30px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.25))}
  .coach .msg{font-size:14.5px;color:var(--ink);font-weight:600}
  .coach .msg b{color:var(--gold2)}

  /* TIP / ATAJO PRO */
  .tip{display:flex;gap:11px;align-items:flex-start;margin:2px 24px 16px;padding:12px 15px;border-radius:14px;
    background:linear-gradient(100deg,color-mix(in srgb,var(--violet) 16%,var(--surf2)),var(--surf2));
    border:1px solid color-mix(in srgb,var(--violet) 38%,transparent)}
  .tip .ti{font-size:20px;filter:drop-shadow(0 0 6px rgba(167,139,250,.5))}
  .tip div{font-size:14px;color:var(--ink);font-weight:600;line-height:1.5}
  .tip b{color:var(--violet);letter-spacing:.03em}
  .tipspk{border:1px solid var(--line);background:var(--surf);border-radius:8px;cursor:pointer;font-size:12px;padding:1px 6px;margin-left:4px}
  kbd{background:var(--surf);border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 7px;font-weight:800;font-size:12px}

  /* ===== POS SIMULATOR ===== */
  .simwrap{margin:6px 24px 20px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#0a1120}
  .sim-top{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#111a2c;border-bottom:1px solid #1f2b44;font-size:12px;color:#8aa0c0;font-weight:700}
  .sim-top .pill{margin-left:auto;background:#0e2a20;color:#4fe0ac;border:1px solid #16543f;border-radius:99px;padding:3px 9px;font-size:11px}
  .sim{display:grid;grid-template-columns:1fr 240px;min-height:360px}
  @media(max-width:620px){ .sim{grid-template-columns:1fr} }
  .grid{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:9px;align-content:start;max-height:420px;overflow:auto}
  .prod{position:relative;background:#131f36;border:1px solid #223251;border-radius:14px;padding:10px 9px 12px;cursor:pointer;text-align:left;transition:transform .09s,box-shadow .15s,border-color .15s;color:#eaf1fb}
  .prod:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(0,0,0,.35)}
  .prod:hover{border-color:#3a4f78}
  .prod:active{transform:scale(.96)}
  .prod .emo{font-size:26px;display:block;margin-bottom:6px}
  .prod .nm{font-size:11.5px;font-weight:700;line-height:1.2;min-height:28px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .prod .pr{margin-top:6px;font-weight:900;color:var(--brand2);font-size:15px}
  .prod .sq{position:absolute;right:7px;bottom:9px;width:26px;height:26px;border-radius:8px;background:#20304f;border:1px solid #33456a;color:#cfe0ff;font-size:14px;display:grid;place-items:center;cursor:pointer}
  .prod .sq:hover{background:var(--brand);color:#042;border-color:transparent}
  .prod.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .sq.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,.5)}50%{box-shadow:0 0 0 8px rgba(251,191,36,0)}}

  .cartp{background:#0d1526;border-left:1px solid #1f2b44;display:flex;flex-direction:column;min-height:360px}
  @media(max-width:620px){ .cartp{border-left:0;border-top:1px solid #1f2b44} }
  .cartp .hd{padding:11px 13px;font-weight:800;font-size:13px;color:#cfe0ff;border-bottom:1px solid #1f2b44;display:flex;align-items:center;gap:7px}
  .cartp .items{flex:1;overflow:auto;padding:8px;display:flex;flex-direction:column;gap:7px}
  .empty{margin:auto;text-align:center;color:#4a5b78;font-size:13px;padding:26px 14px}
  .ci{background:#131f36;border:1px solid #223251;border-radius:11px;padding:8px 10px;display:flex;gap:8px;align-items:center}
  .ci .l{flex:1;min-width:0}
  .ci .nm{font-size:12px;font-weight:700;color:#eaf1fb;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ci .sub{font-size:10.5px;color:#7f93b4}
  .ci .amt{font-weight:900;color:var(--brand2);font-size:13px}
  .ci .x{width:22px;height:22px;border-radius:7px;border:1px solid #33456a;background:#1a2740;color:#c9d6ea;cursor:pointer;font-size:12px}
  .cartp .ft{padding:11px 13px;border-top:1px solid #1f2b44}
  .cartp .tot{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .cartp .tot .k{color:#8aa0c0;font-size:12px;font-weight:700} .cartp .tot .v{font-weight:900;font-size:22px;color:#fff}
  .cobrar{width:100%;padding:13px;border:0;border-radius:13px;background:linear-gradient(140deg,var(--brand),var(--brand2));color:#042;font-weight:900;font-size:15px;cursor:pointer;box-shadow:0 8px 20px rgba(16,185,129,.35)}
  .cobrar:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .cobrar.hl{animation:pulse 1.2s infinite}

  /* CAJA / tickets */
  .chip{border:1px solid #2b3a5a;background:#131f36;color:#cfe0ff;border-radius:99px;padding:6px 14px;font-weight:800;font-size:12.5px;cursor:pointer}
  .chip:hover{background:#1a2740}
  .chip.on{background:linear-gradient(140deg,var(--brand),var(--brand2));color:#042;border-color:transparent}
  .chip.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .tkrow{display:flex;align-items:center;gap:10px;background:#0f1a2e;border:1px solid #223251;border-radius:12px;padding:10px 12px;cursor:pointer;transition:.1s}
  .tkrow:hover{border-color:#3a4f78;transform:translateY(-1px)}
  .tkrow.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  #prnpill.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}

  /* ===== MINI COACH BUBBLE over sim ===== */
  .mission{display:flex;align-items:center;gap:10px;margin:0 24px 6px;padding:11px 14px;border-radius:14px;background:color-mix(in srgb,var(--brand) 14%,var(--surf2));border:1px dashed color-mix(in srgb,var(--brand) 45%,transparent)}
  .mission .mk{font-size:22px}
  .mission .mt{flex:1;font-size:14px;font-weight:700;color:var(--ink)}
  .mission .prog{font-size:12px;font-weight:800;color:var(--brand2);white-space:nowrap}

  /* ===== QUIZ ===== */
  .quiz{margin:6px 24px 8px}
  .qq{font-weight:800;font-size:16px;margin-bottom:12px}
  .opts{display:grid;gap:9px}
  .opt{display:flex;gap:11px;align-items:center;text-align:left;padding:13px 15px;border-radius:13px;border:1px solid var(--line);background:var(--surf2);color:var(--ink);cursor:pointer;font-size:14.5px;font-weight:600;transition:.12s}
  .opt:hover{border-color:var(--brand)}
  .opt .k{width:26px;height:26px;border-radius:8px;background:var(--surf);border:1px solid var(--line);display:grid;place-items:center;font-weight:800;flex-shrink:0}
  .opt.good{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 18%,transparent)}
  .opt.good .k{background:var(--brand);color:#042;border-color:transparent}
  .opt.bad{border-color:var(--rose);background:color-mix(in srgb,var(--rose) 14%,transparent);animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  /* ===== FOOTER NAV ===== */
  .foot{display:flex;align-items:center;gap:12px;padding:16px 24px 22px}
  .foot .sp{flex:1}
  .btn{padding:12px 20px;border-radius:13px;border:1px solid var(--line);background:var(--surf2);color:var(--ink);font-weight:800;font-size:14px;cursor:pointer}
  .btn:hover{background:var(--surf)}
  .btn.primary{background:linear-gradient(140deg,var(--brand),var(--brand2));color:#042;border-color:transparent;box-shadow:0 8px 20px rgba(16,185,129,.3)}
  .btn.primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;filter:grayscale(.4)}
  .btn.ghost{background:transparent}

  /* ===== DONE TICK / TOAST ===== */
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--surf);border:1px solid var(--brand);border-radius:14px;padding:12px 18px;font-weight:800;color:var(--ink);
    box-shadow:var(--shadow);z-index:80;transition:.35s;display:flex;gap:9px;align-items:center;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .coin{position:fixed;font-size:22px;z-index:90;pointer-events:none;transition:transform .8s cubic-bezier(.3,.8,.4,1),opacity .8s}

  /* ===== INTRO / DIPLOMA ===== */
  .hero{padding:40px 26px}
  .hero .badge{font-size:60px;margin-bottom:6px}
  .hero h1{font-size:clamp(26px,6vw,40px);font-weight:900}
  .hero p{color:var(--ink2);font-size:16px;max-width:52ch}
  .statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
  @media(max-width:520px){.statgrid{grid-template-columns:1fr}}
  .stat{background:var(--surf2);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat .v{font-size:22px;font-weight:900} .stat .k{font-size:12px;color:var(--ink3);font-weight:700}
  .diploma{text-align:center;padding:44px 26px}
  .diploma .seal{font-size:70px}
  .locktip{margin:0 24px 20px;font-size:13px;color:var(--ink3);text-align:center}

  /* ticket que sale de la impresora */
  .ticketout{margin:14px auto 2px;width:150px;background:#fff;color:#111;border-radius:4px;padding:10px 12px;
    box-shadow:0 8px 20px rgba(0,0,0,.4);text-align:center;transform-origin:top;
    animation:printout .9s cubic-bezier(.2,.8,.3,1);font-family:ui-monospace,Menlo,monospace}
  @keyframes printout{0%{transform:scaleY(0);opacity:.2}60%{transform:scaleY(1.04)}100%{transform:scaleY(1);opacity:1}}

  /* ===== FLOW SIM (pantallas guiadas) ===== */
  .fscr{padding:14px;display:flex;flex-direction:column;gap:9px;min-height:220px}
  .fhead{font-weight:800;color:#cfe0ff;font-size:13.5px}
  .fnote{color:#7f93b4;font-size:12px;font-weight:600}
  .fopt{display:flex;gap:11px;align-items:center;width:100%;text-align:left;background:#131f36;border:1px solid #223251;
    border-radius:12px;padding:12px 14px;color:#eaf1fb;font-weight:700;font-size:13.5px;cursor:pointer;transition:.12s}
  .fopt:hover{border-color:#3a4f78;transform:translateY(-1px)}
  .fopt:active{transform:scale(.98)}
  .fopt .fk{font-size:21px;flex-shrink:0}
  .fopt small{display:block;color:#7f93b4;font-weight:600;font-size:11px;margin-top:1px}
  .fopt.bad{border-color:var(--rose);animation:shake .35s}
  .fopt.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .fdone{text-align:center;padding:30px 14px;color:#4fe0ac;font-weight:800;font-size:15px;line-height:1.7}

  /* ===== FIDELIDAD ME: pantallas claras (Caja y wizard reales son blancos) ===== */
  .ltwrap{background:#f1f5f9;border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:9px;color:#1e293b}
  .lopt{display:flex;gap:11px;align-items:center;width:100%;text-align:left;background:#fff;border:2px solid #e2e8f0;
    border-radius:14px;padding:12px 14px;color:#1e293b;font-weight:700;font-size:13.5px;cursor:pointer;transition:.12s}
  .lopt:hover{border-color:#94a3b8}
  .lopt:active{transform:scale(.98)}
  .lopt .fk{font-size:21px;flex-shrink:0}
  .lopt small{display:block;color:#64748b;font-weight:600;font-size:11px;margin-top:1px}
  .lopt.bad{border-color:#f43f5e;animation:shake .35s}
  .lopt.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .lhead{font-weight:800;color:#334155;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
  .lnote{color:#64748b;font-size:11.5px;font-weight:600}
  .wizhd{background:linear-gradient(150deg,#059669,#0d9488);border-radius:14px 14px 0 0;margin:-12px -12px 2px;padding:14px;text-align:center;color:#fff}
  .wizhd b{font-size:17px;display:block}
  .wizdots{display:flex;justify-content:center;gap:6px;margin-top:8px}
  .wizdots i{width:26px;height:5px;border-radius:99px;background:rgba(255,255,255,.25);display:block}
  .wizdots i.on{background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,.6)}
  .sil{width:36px;height:36px;border-radius:11px;color:#fff;font-weight:900;display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .metab{border:2px solid #e2e8f0;background:#fff;color:#334155;border-radius:99px;padding:6px 13px;font-weight:800;font-size:12.5px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .metab.on{background:#059669;color:#fff;border-color:transparent}
  .metab.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .metab .bdg{background:rgba(0,0,0,.08);border-radius:99px;font-size:10px;padding:1px 6px;font-weight:900}
  .metab.on .bdg{background:rgba(255,255,255,.25)}
  .tkcard{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:11px 13px;cursor:pointer;transition:.1s;width:100%;text-align:left;color:#1e293b}
  .tkcard:hover{border-color:#94a3b8;transform:translateY(-1px)}
  .tkcard.hl{outline:3px solid var(--gold);outline-offset:2px;animation:pulse 1.2s infinite}
  .tkpill{font-size:9.5px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;border-radius:6px;padding:2px 7px}

  /* ===== CABANOSSI (mascota SVG) ===== */
  .cab{display:inline-block;flex-shrink:0;line-height:0}
  .cab svg{width:100%;height:100%;display:block;overflow:visible}

function beep(freqs,dur,type,vol){ if(!SND.on)return; var c=ac(); if(!c)return;
  var t=c.currentTime; (freqs.length?freqs:[freqs]).forEach(function(f,i){
    var o=c.createOscillator(),g=c.createGain(); o.type=type||'sine'; o.frequency.value=f;
    var st=t+i*(dur*0.55); o.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(0.0001,st); g.gain.exponentialRampToValueAtTime(vol||0.16,st+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,st+dur); o.start(st); o.stop(st+dur+0.02);
  });
}

/* mission engine: steps=[{text, event, match(payload)}] */
function startMission(steps){ sim.mission=steps; sim.step=0; paintMission(); }
function paintMission(){
  var m=sim.mission; if(!m) return;
  var mt=$('#mt'),mp=$('#mp');
  if(sim.step>=m.length){ if(mt){mt.innerHTML='✅ ¡Misión cumplida! Ganaste ⭐. Dale a <b>Siguiente</b>.';} if(mp)mp.textContent=''; clearHL(); return; }
  if(mt) mt.innerHTML=m[sim.step].text;
  if(mp) mp.textContent=(sim.step+1)+' / '+m.length;
  applyHL(m[sim.step].hl);
  cabBounce();
  speak(m[sim.step].text);   // Cabanossi dice en voz alta qué hacer
}
function emit(event,payload){
  var m=sim.mission; if(!m||sim.step>=m.length) return;
  var s=m[sim.step];
  if(s.event===event && (!s.match||s.match(payload))){
    sim.step++; paintMission();
    // el último paso suele ser una celebración con event:'never' → completa la misión al llegar
    if(sim.step>=m.length || (m[sim.step] && m[sim.step].event==='never')){ completeSim(); }
  }
}
function completeSim(){ var l=FLAT[idx(current)]; award(l.id,100); toast('⭐ +100 XP · ¡'+l.t+' logrado!'); cabCheer(); renderSide();
  var b=document.querySelector('[data-nav="next"]'); if(b){b.disabled=false;b.textContent=(idx(current)===FLAT.length-1?'Terminar 🎉':'Siguiente →')} }

function clearHL(){Array.prototype.forEach.call(document.querySelectorAll('.hl'),function(e){e.classList.remove('hl')})}
function applyHL(sel){clearHL(); if(!sel)return; var e=typeof sel==='function'?sel():document.querySelector(sel); if(e)e.classList.add('hl');}

function drawGrid(opts){
  opts=opts||{};
  var g=$('#grid'); if(!g)return; g.innerHTML='';
  CAT.forEach(function(p,i){
    var b=document.createElement('button'); b.className='prod'; b.setAttribute('data-i',i);
    var sq=(!opts.noPres && (p.pres&&p.pres.length))?'<span class="sq" data-sq="'+i+'" title="Presentaciones">▦</span>':'';
    b.innerHTML='<span class="emo">'+emo(p.n)+'</span><span class="nm">'+p.n+'</span><span class="pr tnum">'+money(p.p)+(p.granel?'/kg':'')+'</span>'+sq;
    g.appendChild(b);
  });
  g.addEventListener('click',function(e){
    var sq=e.target.closest('[data-sq]'); if(sq){ e.stopPropagation(); openPres(+sq.getAttribute('data-sq')); return; }
    var pb=e.target.closest('.prod'); if(!pb) return;
    var i=+pb.getAttribute('data-i'), p=CAT[i];
    if(p.granel){ openGranel(i); return; }
    addToCart({nm:p.n, sub:'1 unidad', amt:p.p}); emit('add',{i:i});
  });
  // long-press for analítica
  var timer=null,moved=false;
  g.addEventListener('pointerdown',function(e){var pb=e.target.closest('.prod'); if(!pb||e.target.closest('[data-sq]'))return; moved=false;
    timer=setTimeout(function(){ openAna(+pb.getAttribute('data-i')); },600);});
  g.addEventListener('pointermove',function(){moved=true;});
  g.addEventListener('pointerup',function(){clearTimeout(timer)});
  g.addEventListener('pointerleave',function(){clearTimeout(timer)});
  paintCart();
}
function addToCart(line){ line.amt=Math.round(line.amt*100)/100; sim.cart.push(line); paintCart(); SFX.add(); }
function paintCart(){
  var box=$('#items'); if(!box)return;
  if(!sim.cart.length){ box.innerHTML='<div class="empty">Toca un producto<br>para agregarlo 👆</div>'; }
  else{ box.innerHTML=sim.cart.map(function(c,i){
    return '<div class="ci"><div class="l"><div class="nm">'+c.nm+'</div><div class="sub">'+c.sub+'</div></div>'
      +'<div class="amt tnum">'+money(c.amt)+'</div><button class="x" data-del="'+i+'">✕</button></div>';
  }).join(''); }
  var tot=$('#tot'); if(tot)tot.textContent=money(cartTotal());
  var cb=$('#cobrar'); if(cb)cb.disabled=!sim.cart.length;
  Array.prototype.forEach.call(document.querySelectorAll('[data-del]'),function(el){
    el.addEventListener('click',function(){sim.cart.splice(+el.getAttribute('data-del'),1);paintCart();});
  });
}

/* pestañas reales de la Caja de ME: Todas · NV · Bol · Fac (con contador) */
var TABDEFS=[['Todas','Todas'],['NV','NV'],['Boletas','Bol'],['Facturas','Fac']];
function tkVisible(t,f){ f=f||tsim.filter;
  if(f==='Todas')return true; if(f==='Boletas')return t.t==='BOLETA';
  if(f==='Facturas')return t.t==='FACTURA'; if(f==='NV')return t.t==='NV'; return true; }
function drawChipsInner(){ var c=$('#chips'); if(!c)return;
  TABDEFS.forEach(function(d){
    var count=TICKETS.filter(function(t){return tkVisible(t,d[0])}).length;
    var b=document.createElement('button'); b.className='metab'+(tsim.filter===d[0]?' on':'');
    b.innerHTML=d[1]+' <span class="bdg tnum">'+count+'</span>'; b.setAttribute('data-f',d[0]);
    c.appendChild(b);
  });
}
function drawChips(){
  var c=$('#chips'); if(!c)return; c.innerHTML=''; drawChipsInner();
  if(!c._b){ c._b=1; c.addEventListener('click',function(e){var b=e.target.closest('[data-f]');if(!b)return;
    tsim.filter=b.getAttribute('data-f'); SFX.tap(); drawChips2(); emit('filter',{f:tsim.filter});}); }
}
function drawChips2(){ var c=$('#chips'); if(!c)return; c.innerHTML=''; drawChipsInner(); drawTickets(); }
function drawPrinter(){ var p=$('#prnpill'); if(!p)return;
  p.innerHTML='🖨 Caja-01 <span style="font-size:13px;color:'+(tsim.printerOk?'#4fe0ac':'#ff7a90')+'">●</span>';
  p.style.borderColor=tsim.printerOk?'#16543f':'#5a2030'; p.style.background=tsim.printerOk?'#0e2a20':'#2a1016'; p.style.color='#cfe0ff';
  p.title='Impresora: Caja-01 · '+(tsim.printerOk?'online':'offline')+' · tap: estado y cambio';
  p.onclick=function(){ emit('printer',{}); openImpresora(); };
}
function drawTickets(){
  var box=$('#tklist'); if(!box)return; box.innerHTML='';
  var vis=TICKETS.filter(function(t){return tkVisible(t)});
  if(!vis.length){ box.innerHTML='<div class="lnote" style="text-align:center;padding:26px 10px;background:#fff;border:2px dashed #e2e8f0;border-radius:14px">Aún no hay ventas de ese tipo hoy.</div>'; return; }
  vis.forEach(function(t){
    var est=t.e==='Pagado'?['#065f46','#d1fae5']:(t.e==='Por cobrar'?['#92400e','#fef3c7']:['#991b1b','#fee2e2']);
    var b=document.createElement('button'); b.className='tkcard'; b.setAttribute('data-n',t.n);
    b.innerHTML='<div style="flex:1;min-width:0">'
      +'<div style="font-weight:800;font-size:14px;'+(t.e==='Anulado'?'text-decoration:line-through;color:#94a3b8':'')+'">'+t.n+'</div>'
      +'<div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">'
      +'<span class="tkpill" style="background:#e2e8f0;color:#475569">'+t.t+'</span>'
      +'<span class="tkpill" style="background:'+est[1]+';color:'+est[0]+'">'+t.e+'</span>'
      +'<span class="tkpill" style="background:transparent;color:#94a3b8">'+t.h+'</span>'
      +'</div></div>'
      +'<div style="font-weight:900;color:#059669;font-size:14.5px" class="tnum">'+money(t.m)+'</div>';
    box.appendChild(b);
  });
  if(!box._b){ box._b=1; box.addEventListener('click',function(e){var r=e.target.closest('[data-n]');if(!r)return; SFX.open(); openTicket(r.getAttribute('data-n'));}); }

function openTicket(n){
  var t=TICKETS.filter(function(x){return x.n===n})[0]; if(!t)return;
  var inner='<div style="padding:16px 18px;border-bottom:1px solid var(--line)"><div style="font-weight:900;font-size:16px">🧾 '+t.n+'</div>'

    +'<div style="padding:14px">'

    +'<button class="btn ghost" id="tkclose" style="width:100%;margin-top:6px">Cerrar</button></div>';
  var o=modal(inner);

/* ======================= SIMULADOR RECIBIR GUÍA (réplica del flujo real WH→ME: QR → conteo ciego → resultado) ======================= */
var GUIA=[
 {n:'SIBARITA PANQUITA 31.2GR',cod:'7751851',esp:4},
 {n:'GLORIA QUESO PARMESANO 35GR',cod:'7758891',esp:3},
 {n:'ALACENA KETCHUP 100GR',cod:'7785204',esp:2}
];
var gsim={paso:'guia',rec:{},id:''};
function gTotal(){var t=0;Object.keys(gsim.rec).forEach(function(k){t+=gsim.rec[k]});return t}
function gEsperado(){var t=0;GUIA.forEach(function(p){t+=p.esp});return t}
function allScanned(){ return GUIA.every(function(p,i){return (gsim.rec[i]||0)>=p.esp}); }
function renderGuia(l){
  return '<div class="lead"><div class="eyebrow">🧰 Herramientas · Guías · Entrada</div><h1>'+l.t+'</h1></div>'
    +'<div class="why"><span>💡</span><div><b>¿Por qué importa?</b> El almacén te manda mercadería con una guía. Tú la recibes en 2 pasos: escaneas el QR del ticket de la guía y luego cuentas producto por producto. Así el stock cuadra solo.</div></div>'
    +'<div class="body"><p>Igual que en ME real: <b>Paso 1</b> apuntas la cámara al <b>QR del ticket</b> de la guía (o tecleas el código G…). <b>Paso 2</b> escaneas los productos <b>uno tras otro</b> — ME no te muestra cuánto "debería" llegar: tú cuentas lo que <b>de verdad</b> llegó. Al finalizar, ME compara y el admin ve las diferencias en MOS.</p></div>'
    + tipHtml(l.id)
    +'<div class="mission" id="mission">'+cab(30)+'<span class="mt" id="mt">…</span><span class="prog" id="mp"></span></div>'
    +'<div class="simwrap"><div class="sim-top" style="background:#059669;border-color:#047857;color:#fff">📦 Recibir guía · TIENDA 1<span class="pill" id="gpill" style="background:rgba(255,255,255,.18);color:#fff;border-color:transparent">Escanea el código de la guía</span></div>'
    +'<div id="gbox"></div>'
    +'</div>'
    +footNav();
}
function paintGuia(){
  var box=$('#gbox'); if(!box)return;
  var pill=$('#gpill');
  if(gsim.paso==='guia'){
    if(pill)pill.textContent='Escanea el código de la guía';
    box.innerHTML='<div class="fscr">'
      +'<div style="background:rgba(5,150,105,.15);border:1px solid rgba(5,150,105,.45);border-radius:12px;padding:10px 13px;font-size:12px;color:#6ee7b7;font-weight:700">Paso 1 de 2 · Apunta la cámara al <b>QR del ticket</b> de la guía del almacén. También puedes teclear el código (G…). Luego escanearás los productos uno por uno.</div>'
      +'<button class="fopt" data-g="qr" style="justify-content:center;background:#059669;border-color:#047857;font-size:15px;text-transform:uppercase;letter-spacing:.04em">📷&nbsp; Escanear QR de la guía</button>'
      +'<div class="fnote" style="text-align:center">— o ingresa el código a mano —</div>'
      +'<div style="display:flex;gap:8px"><div style="flex:1;background:#131f36;border:1px solid #223251;border-radius:12px;padding:11px 14px;color:#4a5b78;font-family:ui-monospace,monospace;letter-spacing:.15em">Código de la guía (G...)</div><div style="background:#059669;border-radius:12px;color:#fff;font-weight:900;display:grid;place-items:center;padding:0 16px">→</div></div>'
      +'</div>';
  }
  if(gsim.paso==='escaneo'){
    if(pill)pill.textContent='Guía '+gsim.id;
    var rows=GUIA.map(function(p,i){
      var got=gsim.rec[i]||0;
      return '<div style="display:flex;align-items:center;gap:10px;background:#131f36;border:1px solid #223251;border-radius:12px;padding:10px 12px">'
        +'<span style="font-size:21px">'+emo(p.n)+'</span>'
        +'<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:12.5px;color:#eaf1fb">'+p.n+'</div>'
        +'<div style="font-size:11px;color:#7f93b4;font-family:ui-monospace,monospace">'+p.cod+' · contadas: <b style="color:#4fe0ac">'+got+'</b></div></div>'
        +'<button class="btn primary" style="padding:8px 12px" data-scan="'+i+'">📷 Escanear</button>'
        +'</div>';
    }).join('');
    box.innerHTML='<div class="fscr">'
      +'<div style="background:rgba(5,150,105,.15);border:1px solid rgba(5,150,105,.45);border-radius:10px;padding:8px 12px;font-size:11.5px;color:#6ee7b7;font-weight:700;text-align:center">Paso 2 de 2 · Escanea los productos <b>uno tras otro</b>. La cámara queda abierta y la lista crece sola.</div>'
      +'<div style="background:#059669;color:#fff;font-size:10.5px;font-weight:900;text-align:center;border-radius:8px;padding:4px;display:flex;align-items:center;justify-content:center;gap:6px"><span style="width:8px;height:8px;background:#fff;border-radius:99px;animation:pulse 1.2s infinite"></span> ESCANEANDO EN CONTINUO · apunta producto tras producto</div>'
      +rows
      +'<div style="color:#4fe0ac;font-weight:900;text-align:center;font-size:13px" class="tnum">'+Object.keys(gsim.rec).length+' producto(s) · '+gTotal()+' unidades contadas</div>'
      +'<button class="cobrar" id="gclose" '+(gTotal()>0?'':'disabled')+'>✓ Finalizar y registrar ('+Object.keys(gsim.rec).length+')</button>'
      +'</div>';
  }
  if(gsim.paso==='resultado'){
    if(pill)pill.textContent='Guía '+gsim.id+' · registrada';
    box.innerHTML='<div class="fscr">'
      +'<div style="background:rgba(5,150,105,.2);border:1px solid rgba(5,150,105,.55);border-radius:14px;padding:18px;text-align:center">'
      +'<div style="font-size:36px">✅</div><div style="color:#fff;font-weight:900;font-size:16px">Ingreso completo</div>'
      +'<div style="color:#9fb0c9;font-size:11.5px;margin-top:3px">El admin verá las diferencias en MOS.</div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">'
      +'<div style="background:#131f36;border-radius:12px;padding:10px"><div class="fnote" style="text-transform:uppercase;font-size:9.5px">Enviado</div><div style="color:#fff;font-weight:900;font-size:17px" class="tnum">'+gEsperado()+'</div></div>'
      +'<div style="background:#131f36;border-radius:12px;padding:10px"><div class="fnote" style="text-transform:uppercase;font-size:9.5px">Contado</div><div style="color:#fff;font-weight:900;font-size:17px" class="tnum">'+gTotal()+'</div></div>'
      +'<div style="background:#131f36;border-radius:12px;padding:10px"><div class="fnote" style="text-transform:uppercase;font-size:9.5px">Líneas dif.</div><div style="color:#4fe0ac;font-weight:900;font-size:17px" class="tnum">0</div></div>'
      +'</div>'
      +'<button class="cobrar" id="glisto">Listo ✓</button>'
      +'</div>';
  }
  bindGuia();
}
function bindGuia(){
  var box=$('#gbox'); if(!box)return;
  if(!box._b){ box._b=1; box.addEventListener('click',function(e){
    var qr=e.target.closest('[data-g="qr"]');
    if(qr){ SFX.scan(); gsim.id='G-8412'; gsim.paso='escaneo'; paintGuia(); emit('gid',{}); return; }
    var b=e.target.closest('[data-scan]');
    if(b){ var i=+b.getAttribute('data-scan');
      var got=gsim.rec[i]||0;
      if(got>=GUIA[i].esp){ SFX.tap(); return; } // ya contaste todo lo que llegó de este
      gsim.rec[i]=got+1; SFX.scan(); paintGuia(); emit('scan',{i:i});
      if(allScanned()) emit('allscanned',{});
      return; }
    var gc=e.target.closest('#gclose');
    if(gc && !gc.disabled){
      if(!allScanned()){ SFX.bad(); var mt=$('#mt'); if(mt)mt.innerHTML='🐾 Aún faltan unidades por contar — son 9 en total. Sigue escaneando.'; return; }
      SFX.ok(); gsim.paso='resultado'; paintGuia(); emit('close',{}); return; }
    var gl=e.target.closest('#glisto');
    if(gl){ SFX.ok(); emit('listo',{}); return; }
  }); }
}
function initGuia(l){ gsim={paso:'guia',rec:{},id:''}; paintGuia(); startMission([

  {text:'¡9 unidades contadas! Toca <b>✓ Finalizar y registrar</b>.', event:'close', hl:function(){return document.querySelector('#gclose')}},
  {text:'✅ Ingreso completo: Enviado 9 = Contado 9, cero diferencias. Toca <b>Listo ✓</b>.', event:'listo', hl:function(){return document.querySelector('#glisto')}},
  {text:'El stock ya entró a tu zona, todo cuadrado. 🎉', event:'never'}
]); }

function renderFlow(l){
  var cfg=FLOWS[l.id];
  return '<div class="lead"><div class="eyebrow">'+l.mod.ico+' '+l.mod.t+'</div><h1>'+l.t+'</h1></div>'
    +'<div class="why"><span>💡</span><div><b>¿Por qué importa?</b> '+cfg.why+'</div></div>'
    +'<div class="body">'+cfg.body+'</div>'
    + tipHtml(l.id)
    +'<div class="mission" id="mission">'+cab(30)+'<span class="mt" id="mt">…</span><span class="prog" id="mp"></span></div>'
    +'<div class="simwrap"><div class="sim-top">'+cfg.top+'</div><div id="fbox"></div></div>'
    +footNav();
}
var fsim={step:0,cfg:null,lid:null,tok:0};
function initFlow(l){
  fsim={step:0,cfg:FLOWS[l.id],lid:l.id,tok:fsim.tok+1};
  var box=$('#fbox');
  if(box&&!box._b){ box._b=1; box.addEventListener('click',function(e){
    var b=e.target.closest('[data-act]'); if(!b)return;
    var st=fsim.cfg&&fsim.cfg.steps[fsim.step]; if(!st||st.auto)return;
    if(b.getAttribute('data-act')===st.ok){ SFX.ok(); advFlow(); }
    else{ SFX.bad(); b.classList.add('bad'); setTimeout(function(){b.classList.remove('bad')},420);
      var mt=$('#mt'); if(mt){ mt.innerHTML='🐾 '+(st.no||'Ese no… fíjate en lo que brilla dorado.'); speak(st.no||'Ese no. Fíjate en lo que brilla.'); } }
  }); }
  paintFlow();
}
function advFlow(){
  fsim.step++;
  if(fsim.step>=fsim.cfg.steps.length){
    var mt=$('#mt'),mp=$('#mp');
    if(mt)mt.innerHTML='✅ ¡Misión cumplida! Dale a <b>Siguiente</b>.'; if(mp)mp.textContent='';
    var fb=$('#fbox'); if(fb&&fsim.cfg.done) fb.innerHTML='<div class="fdone">'+fsim.cfg.done+'</div>';
    completeSim(); return;
  }
  paintFlow();
}
function paintFlow(){
  var st=fsim.cfg.steps[fsim.step], mt=$('#mt'),mp=$('#mp'),fb=$('#fbox');
  if(mt)mt.innerHTML=st.say; if(mp)mp.textContent=(fsim.step+1)+' / '+fsim.cfg.steps.length;
  if(fb)fb.innerHTML='<div class="fscr">'+st.screen+'</div>';
  if(st.ok){ var okEl=document.querySelector('#fbox [data-act="'+st.ok+'"]'); if(okEl)okEl.classList.add('hl'); }
  cabBounce();
  speak(st.say);
  if(st.auto){ var tok=fsim.tok, s=fsim.step, lid=fsim.lid;
    setTimeout(function(){ if(fsim.tok===tok&&fsim.step===s&&FLAT[idx(current)].id===lid){ SFX.ok(); advFlow(); } }, st.auto); }
}

function renderExam(l){
  return '<div class="lead"><div class="eyebrow">🎓 Examen final</div><h1>'+l.t+'</h1></div>'
    +'<div class="why"><span>💡</span><div><b>¿Por qué importa?</b> Son '+EXAMQ.length+' situaciones reales de un día en caja. Respóndelas bien y el diploma es tuyo.</div></div>'
    +'<div class="coach">'+cab(46)+'<div class="msg" id="excoach">…</div></div>'
    +'<div class="quiz" id="exbox" style="margin-bottom:12px"></div>'
    +footNav();
}
var ex={i:0,lock:0};
function initExam(l){
  if(isDone(l.id)){ paintExamDone(); return; }
  ex={i:0,lock:0}; paintExamQ();
}
function paintExamQ(){
  ex.lock=0;
  var q=EXAMQ[ex.i];
  var ec=$('#excoach'); if(ec) ec.innerHTML='Pregunta <b>'+(ex.i+1)+' de '+EXAMQ.length+'</b> — tranquilo, esto ya lo practicaste. <button class="tipspk" data-say="'+encodeURIComponent(q.q)+'" title="Escuchar la pregunta">🔊 Repetir</button>';
  $('#exbox').innerHTML='<div class="qq">'+q.q+'</div><div class="opts">'
    +q.opts.map(function(o,k){return '<button class="opt" data-ex="'+k+'"><span class="k">'+String.fromCharCode(65+k)+'</span><span>'+o+'</span></button>'}).join('')
    +'</div><div id="qtip" style="margin-top:12px;color:var(--ink2);font-size:13.5px;min-height:18px"></div>';
  speak(q.q);
  Array.prototype.forEach.call(document.querySelectorAll('[data-ex]'),function(el){
    el.addEventListener('click',function(){
      if(ex.lock)return;
      var k=+el.getAttribute('data-ex'), q2=EXAMQ[ex.i];
      if(k===q2.a){ ex.lock=1; el.classList.add('good'); SFX.ok(); $('#qtip').innerHTML='✅ '+q2.tip; speak(q2.tip);
        setTimeout(function(){ ex.i++; if(ex.i>=EXAMQ.length){ completeSim(); paintExamDone(); } else paintExamQ(); },1300);
      } else { el.classList.add('bad'); SFX.bad(); $('#qtip').innerHTML='🐾 Casi… recuerda lo que practicaste hoy.'; setTimeout(function(){el.classList.remove('bad')},420); }
    });
  });
}
function paintExamDone(){
  var ec=$('#excoach'); if(ec) ec.innerHTML='<b>¡Aprobaste el examen!</b> 🎉 ¡Guau guau! Ve por tu diploma con <b>Siguiente</b>.';
  var eb=$('#exbox'); if(eb) eb.innerHTML='<div style="text-align:center;padding:26px 10px">'
    +'<div style="font-size:52px">🏆</div>'
    +'<div style="font-weight:900;font-size:20px;margin:8px 0 4px">'+EXAMQ.length+' de '+EXAMQ.length+'</div>'
    +'<div style="color:var(--ink2);font-size:14px">Dominas el día 1 de caja. Cabanossi está orgulloso de ti.</div></div>';
}

/* ---------- DIPLOMA ---------- */
function renderDiploma(l){
  var doneCount=FLAT.filter(function(f){return f.kind!=='diploma'&&isDone(f.id)}).length;
  var totalLes=FLAT.filter(function(f){return f.kind!=='diploma'}).length;
  var full=doneCount>=totalLes;
  if(full && !isDone(l.id)){ ST.done[l.id]=1; ST.xp+=100; save(); }
  return '<div class="diploma"><div class="seal">'+(full?'🏆':'🎓')+'</div>'
    +(full?'<div style="margin:4px 0 2px">'+cabFull(180)+'</div>':'')
    +(full? '<div class="eyebrow" style="margin:0 auto">Capacitación completada</div>'
           +'<h1 style="font-size:clamp(24px,5vw,34px);margin:14px 0 8px">¡Felicidades, ya eres cajero ME!</h1>'
           +'<p style="color:var(--ink2);max-width:46ch;margin:0 auto">Completaste las <b>'+totalLes+' lecciones</b> y ganaste <b>⭐ '+ST.xp+' XP</b>. Sabes vender, cobrar, manejar la caja, la impresora y el almacén. 🐶💚</p>'
           +'<div class="statgrid" style="max-width:420px;margin:22px auto"><div class="stat"><div class="v">✅ '+totalLes+'</div><div class="k">lecciones</div></div><div class="stat"><div class="v tnum">⭐ '+ST.xp+'</div><div class="k">XP total</div></div><div class="stat"><div class="v">100%</div><div class="k">completado</div></div></div>'
           +'<button class="btn ghost" id="reset" style="margin-top:6px">↺ Reiniciar capacitación</button>'
        : '<h1>Casi lo logras 💪</h1><p style="color:var(--ink2);max-width:40ch;margin:8px auto">Te faltan <b>'+(totalLes-doneCount)+' lección(es)</b>. Vuelve al mapa de la izquierda y completa las que tienen 🔒. ¡Tú puedes!</p>')
    +'</div>';
}
