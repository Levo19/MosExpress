<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MosExpress Radio</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0014">
<!--
  MOSEXPRESS RADIO — pantalla publicitaria para SmartTV
  =====================================================
  Versión LIGERA y COMPATIBLE: JS en ES5 + CSS sin features modernos.
  Corre en navegadores viejos (LG webOS 2015, Chromium ~38) sin colgarse.

  - 1 sola llamada al endpoint radio_productos (payload ~40KB, no ~1MB)
  - Sin CSS Grid, sin backdrop-filter, sin filter:blur (orbes con gradiente)
  - Sin async/await, fetch, ?., template literals (todo XMLHttpRequest + ES5)

  URL para la TV: https://[host]/MosExpress/radio.html
  Datos: endpoint radio_productos (catálogo + ventas + config, server-side)
-->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; color:#fff; background:#0a0014;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }

  /* ===== FONDO ===== */
  .bg-gradient {
    position:fixed; top:0; right:0; bottom:0; left:0; z-index:-3;
    background:linear-gradient(125deg,#1a0033 0%,#4a0e4e 25%,#c9184a 50%,#ff6b35 75%,#f7c948 100%);
    background-size:400% 400%;
    -webkit-animation:gradientShift 25s ease infinite;
    animation:gradientShift 25s ease infinite;
    opacity:0.5;
  }
  @-webkit-keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
  @keyframes gradientShift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }

  /* ORBES — radial-gradient (sin filter:blur, gratis en GPU vieja) */
  .orbs { position:fixed; top:0; right:0; bottom:0; left:0; z-index:-2; overflow:hidden; pointer-events:none; }
  .orb { position:absolute; border-radius:50%; }
  .orb-1 { width:620px; height:620px; top:-15%; left:-12%;
    background:radial-gradient(circle,rgba(255,107,53,0.55) 0%,rgba(255,107,53,0) 70%);
    -webkit-animation:float1 22s ease-in-out infinite; animation:float1 22s ease-in-out infinite; }
  .orb-2 { width:520px; height:520px; bottom:-18%; right:-12%;
    background:radial-gradient(circle,rgba(255,215,0,0.5) 0%,rgba(255,215,0,0) 70%);
    -webkit-animation:float2 28s ease-in-out infinite; animation:float2 28s ease-in-out infinite; }
  .orb-3 { width:560px; height:560px; top:25%; right:15%;
    background:radial-gradient(circle,rgba(201,24,74,0.5) 0%,rgba(201,24,74,0) 70%);
    -webkit-animation:float3 35s ease-in-out infinite; animation:float3 35s ease-in-out infinite; }
  @-webkit-keyframes float1 { 0%,100%{-webkit-transform:translate(0,0)} 50%{-webkit-transform:translate(38vw,28vh)} }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(38vw,28vh)} }
  @-webkit-keyframes float2 { 0%,100%{-webkit-transform:translate(0,0)} 50%{-webkit-transform:translate(-28vw,-22vh)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-28vw,-22vh)} }
  @-webkit-keyframes float3 { 0%,100%{-webkit-transform:translate(0,0)} 50%{-webkit-transform:translate(-18vw,30vh)} }
  @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-18vw,30vh)} }

  .noise { position:fixed; top:0; right:0; bottom:0; left:0; z-index:-1; pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 0%,rgba(0,0,0,0.6) 100%); }

  /* ===== LOADING ===== */
  .loading-screen {
    position:fixed; top:0; right:0; bottom:0; left:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    -webkit-transition:opacity 0.6s ease; transition:opacity 0.6s ease;
    background:#0a0014;
  }
  .loading-screen.hidden { opacity:0; visibility:hidden; }
  .loading-logo {
    font-size:48px; font-weight:900; letter-spacing:4px; color:#ffd700;
    background:linear-gradient(90deg,#ffd700,#ff6b35);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:28px;
  }
  .loading-spinner {
    width:56px; height:56px; border:4px solid rgba(255,255,255,0.12);
    border-top-color:#ffd700; border-radius:50%;
    -webkit-animation:spin 1s linear infinite; animation:spin 1s linear infinite;
    margin-bottom:24px;
  }
  @-webkit-keyframes spin { to{-webkit-transform:rotate(360deg)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-msg { font-size:16px; opacity:0.7; letter-spacing:2px; }

  /* ===== LAYOUT (flexbox, sin CSS Grid) ===== */
  .stage { display:flex; flex-direction:column; height:100vh; padding:22px 28px; }
  .stage > * { flex-shrink:0; }
  .stage > .hero { -webkit-box-flex:1; flex:1 1 auto; min-height:0; }
  .stage > * + * { margin-top:16px; }

  header { display:flex; justify-content:space-between; align-items:center; }
  .logo {
    font-size:26px; font-weight:900; letter-spacing:2px; color:#ffd700;
    background:linear-gradient(90deg,#ffd700,#ff6b35);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .logo span { -webkit-text-fill-color:#fff; color:#fff; opacity:0.65; font-weight:300; margin-left:8px; }
  .clock { font-size:22px; font-weight:300; opacity:0.85; }

  .hero { display:flex; min-height:0; }
  .estrella {
    -webkit-box-flex:1; flex:1 1 auto; min-width:0; position:relative;
    border-radius:24px; overflow:hidden;
    background:rgba(40,10,50,0.55);
    border:1px solid rgba(255,255,255,0.12);
  }
  aside { width:360px; flex-shrink:0; margin-left:20px;
    display:flex; flex-direction:column; min-height:0; }

  /* ESTRELLA */
  .estrella-img {
    position:absolute; top:0; right:0; bottom:0; left:0;
    background-size:cover; background-position:center;
    -webkit-animation:kenburns 22s ease-in-out infinite alternate;
    animation:kenburns 22s ease-in-out infinite alternate;
  }
  .estrella-img:after {
    content:''; position:absolute; top:0; right:0; bottom:0; left:0;
    background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.25) 60%,transparent 100%);
  }
  @-webkit-keyframes kenburns { 0%{-webkit-transform:scale(1.05)} 100%{-webkit-transform:scale(1.22)} }
  @keyframes kenburns { 0%{transform:scale(1.05)} 100%{transform:scale(1.22)} }
  .estrella-img.no-image { -webkit-animation:none; animation:none; }
  .estrella-img.no-image:before {
    content:attr(data-emoji); position:absolute; top:0; right:0; bottom:0; left:0;
    display:flex; align-items:center; justify-content:center;
    font-size:260px; line-height:1; z-index:1;
    -webkit-animation:emojiFloat 6s ease-in-out infinite alternate;
    animation:emojiFloat 6s ease-in-out infinite alternate;
  }
  @-webkit-keyframes emojiFloat { 0%{-webkit-transform:translateY(0)} 100%{-webkit-transform:translateY(-22px)} }
  @keyframes emojiFloat { 0%{transform:translateY(0)} 100%{transform:translateY(-22px)} }
  .cat-watermark {
    position:absolute; right:28px; top:24px; z-index:2;
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.18);
    padding:6px 14px; border-radius:999px;
    font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; opacity:0.85;
  }
  .estrella-content {
    position:absolute; left:0; right:0; bottom:0; padding:36px; z-index:3;
    display:flex; flex-direction:column;
  }
  .estrella-content > * + * { margin-top:14px; }
  .tag-fire {
    align-self:flex-start;
    background:linear-gradient(90deg,#ff3838,#ff6b35);
    padding:9px 18px; border-radius:999px;
    font-size:14px; font-weight:800; letter-spacing:1.5px;
    -webkit-animation:glow 2.5s ease-in-out infinite alternate;
    animation:glow 2.5s ease-in-out infinite alternate;
  }
  @-webkit-keyframes glow { from{box-shadow:0 0 20px #ff6b35} to{box-shadow:0 0 45px #ffd700} }
  @keyframes glow { from{box-shadow:0 0 20px #ff6b35} to{box-shadow:0 0 45px #ffd700} }
  .estrella-nombre { font-size:58px; font-weight:900; line-height:1.05; text-shadow:0 4px 24px rgba(0,0,0,0.8); }
  .estrella-desc { font-size:17px; opacity:0.85; }
  .estrella-precio { display:flex; align-items:baseline; }
  .estrella-precio > * + * { margin-left:10px; }
  .precio-moneda { font-size:26px; opacity:0.8; }
  .precio-valor { font-size:80px; font-weight:900; line-height:1; color:#ffd700; text-shadow:0 0 36px rgba(255,215,0,0.5); }
  .estrella-pedidos {
    margin-left:auto; background:rgba(0,0,0,0.55);
    border:1px solid rgba(255,255,255,0.18); padding:8px 16px; border-radius:12px; font-size:14px;
  }
  .estrella-pedidos strong { color:#ffd700; font-size:18px; }
  .estrella-content.swap, .estrella-img.swap {
    -webkit-animation:swapOut 0.5s ease forwards; animation:swapOut 0.5s ease forwards;
  }
  @-webkit-keyframes swapOut { 0%{opacity:1;-webkit-transform:scale(1)} 100%{opacity:0;-webkit-transform:scale(1.04)} }
  @keyframes swapOut { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.04)} }

  /* ASIDE / CARDS */
  .aside-title { font-size:14px; font-weight:700; letter-spacing:3px; opacity:0.7; padding:0 4px; margin-bottom:12px; }
  .cards { display:flex; flex-direction:column; -webkit-box-flex:1; flex:1 1 auto; min-height:0; }
  .cards > * + * { margin-top:12px; }
  .card {
    -webkit-box-flex:1; flex:1 1 0; min-height:0;
    display:flex; padding:12px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12); border-radius:16px;
    overflow:hidden; position:relative;
  }
  .card > * + * { margin-left:14px; }
  .card.slide-in { -webkit-animation:slideIn 0.6s ease both; animation:slideIn 0.6s ease both; }
  .card.slide-out { -webkit-animation:slideOut 0.5s ease both; animation:slideOut 0.5s ease both; }
  @-webkit-keyframes slideIn { from{opacity:0;-webkit-transform:translateX(60px)} to{opacity:1;-webkit-transform:translateX(0)} }
  @keyframes slideIn { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:translateX(0)} }
  @-webkit-keyframes slideOut { from{opacity:1;-webkit-transform:translateX(0)} to{opacity:0;-webkit-transform:translateX(-60px)} }
  @keyframes slideOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-60px)} }
  .card-img {
    width:96px; flex-shrink:0; border-radius:12px; overflow:hidden;
    background-size:cover; background-position:center; position:relative;
  }
  .card-img.no-image:before {
    content:attr(data-emoji); position:absolute; top:0; right:0; bottom:0; left:0;
    display:flex; align-items:center; justify-content:center; font-size:48px; line-height:1;
  }
  .card-info { display:flex; flex-direction:column; justify-content:center; -webkit-box-flex:1; flex:1 1 auto; min-width:0; }
  .card-info > * + * { margin-top:4px; }
  .card-nombre { font-size:16px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-desc { font-size:12px; opacity:0.6; }
  .card-precio { font-size:22px; font-weight:900; color:#ffd700; margin-top:auto; }

  /* PLAYER */
  .player-bar {
    display:flex; align-items:center;
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);
    border-radius:16px; padding:12px 20px;
  }
  .player-bar > * + * { margin-left:18px; }
  .yt-frame-wrap { width:78px; height:48px; border-radius:9px; overflow:hidden;
    flex-shrink:0; background:#000; }
  .yt-frame-wrap iframe { width:100%; height:100%; border:0; }
  .visualizer { display:flex; align-items:flex-end; height:34px; }
  .visualizer > * + * { margin-left:3px; }
  .bar { width:4px; background:linear-gradient(to top,#ff6b35,#ffd700); border-radius:2px;
    -webkit-animation:bounce 0.6s ease-in-out infinite alternate; animation:bounce 0.6s ease-in-out infinite alternate; }
  .bar:nth-child(1){-webkit-animation-delay:0s;animation-delay:0s;height:16px}
  .bar:nth-child(2){-webkit-animation-delay:0.1s;animation-delay:0.1s;height:28px}
  .bar:nth-child(3){-webkit-animation-delay:0.2s;animation-delay:0.2s;height:12px}
  .bar:nth-child(4){-webkit-animation-delay:0.15s;animation-delay:0.15s;height:30px}
  .bar:nth-child(5){-webkit-animation-delay:0.05s;animation-delay:0.05s;height:20px}
  .bar:nth-child(6){-webkit-animation-delay:0.25s;animation-delay:0.25s;height:26px}
  .bar:nth-child(7){-webkit-animation-delay:0.1s;animation-delay:0.1s;height:14px}
  @-webkit-keyframes bounce { from{-webkit-transform:scaleY(0.3)} to{-webkit-transform:scaleY(1)} }
  @keyframes bounce { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }
  .now-playing { display:flex; flex-direction:column; -webkit-box-flex:1; flex:1 1 auto; min-width:0; }
  .now-playing > * + * { margin-top:2px; }
  .np-label { font-size:11px; letter-spacing:2px; opacity:0.55; font-weight:700; }
  .np-title { font-size:16px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .playlist-tag {
    background:rgba(255,150,50,0.25); border:1px solid rgba(255,215,0,0.4);
    padding:6px 14px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:1px;
  }

  /* TICKER */
  .ticker {
    background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.08);
    border-radius:12px; overflow:hidden; position:relative; padding:11px 0;
  }
  .ticker-track { display:flex; white-space:nowrap;
    -webkit-animation:tickerScroll 45s linear infinite; animation:tickerScroll 45s linear infinite; }
  .ticker-track > * + * { margin-left:50px; }
  .ticker-item { font-size:16px; font-weight:600; display:inline-block; padding:0 10px; }
  .ticker-item.dot { color:#ffd700; }
  @-webkit-keyframes tickerScroll { from{-webkit-transform:translateX(0)} to{-webkit-transform:translateX(-50%)} }
  @keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* PARTICLES — pocas y livianas */
  .particles { position:fixed; top:0; right:0; bottom:0; left:0; pointer-events:none; z-index:0; }
  .particle { position:absolute; width:4px; height:4px; background:#ffd700; border-radius:50%;
    opacity:0; -webkit-animation:particleRise 12s linear infinite; animation:particleRise 12s linear infinite; }
  @-webkit-keyframes particleRise {
    0%{-webkit-transform:translateY(100vh);opacity:0} 12%{opacity:0.7} 88%{opacity:0.5} 100%{-webkit-transform:translateY(-10vh);opacity:0} }
  @keyframes particleRise {
    0%{transform:translateY(100vh);opacity:0} 12%{opacity:0.7} 88%{opacity:0.5} 100%{transform:translateY(-10vh);opacity:0} }

  /* AUDIO CHIP */
  .audio-chip {
    position:fixed; bottom:104px; right:28px; z-index:50;
    background:rgba(0,0,0,0.78); border:1px solid rgba(255,215,0,0.45);
    padding:13px 20px; border-radius:999px;
    font-size:15px; font-weight:700;
    display:flex; align-items:center; pointer-events:none;
    -webkit-transition:opacity 0.5s ease; transition:opacity 0.5s ease;
  }
  .audio-chip > * + * { margin-left:10px; }
  .audio-chip.hidden { opacity:0; }
  .audio-chip .icon { font-size:22px; }

  /* UPDATE OVERLAY */
  .update-overlay {
    position:fixed; top:0; right:0; bottom:0; left:0; z-index:200;
    background:rgba(10,0,20,0.94);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden;
    -webkit-transition:opacity 0.6s ease; transition:opacity 0.6s ease;
  }
  .update-overlay.show { opacity:1; visibility:visible; }
  .update-box {
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,215,0,0.4);
    padding:50px 80px; border-radius:28px; text-align:center; max-width:560px;
  }
  .update-icon { font-size:72px; line-height:1; margin-bottom:18px; display:inline-block;
    -webkit-animation:spin 3s linear infinite; animation:spin 3s linear infinite; }
  .update-box h2 { font-size:32px; font-weight:900; color:#ffd700; margin-bottom:8px; }
  .update-box .ver { font-size:17px; opacity:0.85; margin-bottom:24px; }
  .update-box .ver strong { color:#ffd700; }
  .update-bar { width:100%; height:8px; background:rgba(255,255,255,0.12); border-radius:4px; overflow:hidden; }
  .update-bar-fill { height:100%; width:0; background:linear-gradient(90deg,#ff6b35,#ffd700);
    -webkit-animation:updateBar 3.2s ease forwards; animation:updateBar 3.2s ease forwards; }
  @-webkit-keyframes updateBar { from{width:0} to{width:100%} }
  @keyframes updateBar { from{width:0} to{width:100%} }
  .update-msg { margin-top:14px; font-size:14px; opacity:0.6; letter-spacing:1.5px; }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="noise"></div>
<div class="particles" id="particles"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">MOSEXPRESS</div>
  <div class="loading-spinner"></div>
  <div class="loading-msg" id="loadingMsg">Cargando...</div>
</div>

<div class="stage">
  <header>
    <div class="logo">MOSEXPRESS<span>RADIO</span></div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <div class="hero">
    <div class="estrella">
      <div class="estrella-img" id="estrellaImg"></div>
      <div class="estrella-content" id="estrellaContent">
        <span class="tag-fire">&#128293; MAS VENDIDO HOY</span>
        <h1 class="estrella-nombre" id="estrellaNombre">&mdash;</h1>
        <div class="estrella-desc" id="estrellaDesc"></div>
        <div class="estrella-precio">
          <span class="precio-moneda">S/</span>
          <span class="precio-valor" id="estrellaPrecio">0.00</span>
          <div class="estrella-pedidos"><strong id="estrellaPedidos">0</strong> vendidos hoy</div>
        </div>
      </div>
    </div>
    <aside>
      <div class="aside-title">TAMBIEN HOY</div>
      <div class="cards" id="cards"></div>
    </aside>
  </div>

  <div class="player-bar">
    <div class="yt-frame-wrap">
      <iframe id="ytplayer" src="" allow="autoplay; encrypted-media" frameborder="0"></iframe>
    </div>
    <div class="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="now-playing">
      <div class="np-label">REPRODUCIENDO</div>
      <div class="np-title" id="npTitle">MosExpress Radio</div>
    </div>
    <div class="playlist-tag" id="playlistTag">&mdash;</div>
  </div>

  <div class="ticker">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<div class="audio-chip" id="audioChip">
  <span class="icon">&#128263;</span>
  <span>Presiona cualquier tecla para sonido</span>
</div>

<div class="update-overlay" id="updateOverlay">
  <div class="update-box">
    <div class="update-icon">&#128640;</div>
    <h2>NUEVA VERSION DISPONIBLE</h2>
    <div class="ver">Actualizando a <strong id="updateVer">--</strong></div>
    <div class="update-bar"><div class="update-bar-fill"></div></div>
    <div class="update-msg">Recargando automaticamente...</div>
  </div>
</div>

<script>
/* ===================================================================
   MOSEXPRESS RADIO — JS en ES5 puro (compatible navegadores 2014+)
   Sin async/await, fetch, arrow functions, template literals, ?.
   =================================================================== */
(function () {
  'use strict';

  // [CERO-GAS 2026-07-19 · SQL 536] Endpoint 100% Supabase: RPC public.radio_productos()
  // (wrapper de me.radio_productos: canónicos V4 + me.radio_ventas + tabla me.radio_config).
  // GET con apikey anon en query — sin headers, compatible con el xhrGet ES5 de SmartTV.
  var SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ6YnpkZWlwYnRxa3pqcWRjaHFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzYwMDQsImV4cCI6MjA5NjQ1MjAwNH0.MAlSdz_ugGUZoaU5st6dA_gb_x_IiUL0TXxH176kY9k';
  var API_URL = 'https://rzbzdeipbtqkzjqdchqk.supabase.co/rest/v1/rpc/radio_productos?apikey=' + SB_ANON;

  /* ===== Categorías: gradiente + emoji para productos sin foto ===== */
  var CATEGORIAS = {
    bebidas:    { g:'linear-gradient(135deg,#1565c0,#00bcd4)', e:'🥤' },
    cerveza:    { g:'linear-gradient(135deg,#f57c00,#ffc107)', e:'🍺' },
    snacks:     { g:'linear-gradient(135deg,#d84315,#ff8a65)', e:'🥨' },
    chocolate:  { g:'linear-gradient(135deg,#4e342e,#a1887f)', e:'🍫' },
    golosinas:  { g:'linear-gradient(135deg,#c2185b,#f48fb1)', e:'🍬' },
    lacteos:    { g:'linear-gradient(135deg,#607d8b,#cfd8dc)', e:'🥛' },
    panaderia:  { g:'linear-gradient(135deg,#bf6b00,#ffb74d)', e:'🥖' },
    abarrotes:  { g:'linear-gradient(135deg,#558b2f,#c5e1a5)', e:'🌾' },
    especerias: { g:'linear-gradient(135deg,#a1530d,#d4a76a)', e:'🧂' },
    salsas:     { g:'linear-gradient(135deg,#b71c1c,#ef5350)', e:'🥫' },
    aderezos:   { g:'linear-gradient(135deg,#2e7d32,#81c784)', e:'🫒' },
    conservas:  { g:'linear-gradient(135deg,#6d4c41,#bcaaa4)', e:'🥫' },
    limpieza:   { g:'linear-gradient(135deg,#0277bd,#4fc3f7)', e:'🧼' },
    higiene:    { g:'linear-gradient(135deg,#00838f,#80deea)', e:'🧻' },
    agua:       { g:'linear-gradient(135deg,#006064,#4dd0e1)', e:'💧' },
    cigarros:   { g:'linear-gradient(135deg,#424242,#757575)', e:'🚬' },
    helados:    { g:'linear-gradient(135deg,#1e88e5,#b3e5fc)', e:'🍦' },
    galletas:   { g:'linear-gradient(135deg,#ef6c00,#ffcc80)', e:'🍪' },
    def:        { g:'linear-gradient(135deg,#455a64,#90a4ae)', e:'🛒' }
  };
  function catOf(k) { return CATEGORIAS[k] || CATEGORIAS.def; }

  /* ===== Estado ===== */
  var PRODUCTOS = [];
  var PLAYLISTS = [];
  var TICKER    = [];
  var DESTACADOS = [];
  var CONFIG = { rotarEstrellaSeg: 12, rotarCardsSeg: 7 };

  /* ===== XHR helper (en vez de fetch) ===== */
  function xhrGet(url, onOk, onErr) {
    var x = new XMLHttpRequest();
    x.open('GET', url, true);
    try { x.timeout = 30000; } catch (e) {}
    x.onreadystatechange = function () {
      if (x.readyState !== 4) return;
      if (x.status >= 200 && x.status < 300) {
        var data = null;
        try { data = JSON.parse(x.responseText); } catch (e) { data = null; }
        if (data) { onOk(data); } else if (onErr) { onErr('parse'); }
      } else if (onErr) { onErr(x.status); }
    };
    x.ontimeout = function () { if (onErr) onErr('timeout'); };
    x.onerror   = function () { if (onErr) onErr('neterror'); };
    x.send();
  }

  /* ===== Carga de datos: 1 sola llamada al endpoint liviano ===== */
  function cargarData() {
    setLoadingMsg('Conectando con MosExpress...');
    xhrGet(API_URL, function (res) {
      PRODUCTOS  = res.productos  || [];
      PLAYLISTS  = res.playlists  || [];
      TICKER     = res.ticker     || [];
      DESTACADOS = res.destacados || [];
      if (res.config) CONFIG = res.config;
      if (!PRODUCTOS.length) PRODUCTOS = mockProductos();
      if (!TICKER.length)    TICKER = mockTicker();
      if (!PLAYLISTS.length) PLAYLISTS = mockPlaylists();
      arrancar();
    }, function (err) {
      // Falló la red: arrancamos igual con datos de muestra (la TV nunca queda en blanco)
      if (window.console) console.warn('[RADIO] fetch fallo:', err);
      PRODUCTOS = mockProductos();
      TICKER    = mockTicker();
      PLAYLISTS = mockPlaylists();
      arrancar();
    });
  }

  /* ===== Recarga periódica de datos (sin reconstruir intervalos) ===== */
  function refrescarData() {
    xhrGet(API_URL, function (res) {
      if (res.productos && res.productos.length) PRODUCTOS = res.productos;
      if (res.playlists && res.playlists.length) PLAYLISTS = res.playlists;
      if (res.ticker && res.ticker.length) { TICKER = res.ticker; renderTicker(); }
      if (res.destacados) DESTACADOS = res.destacados;
      if (res.config) CONFIG = res.config;
    }, function () {});
  }

  /* ===== Datos de muestra (fallback si no hay red) ===== */
  function mockProductos() {
    return [
      { sku:'M1', nombre:'COCA COLA 1.5L',     precio:7.50,  vendidos:92,  categoria:'bebidas',   img:'' },
      { sku:'M2', nombre:'CERVEZA PILSEN 6PK',  precio:24.90, vendidos:48,  categoria:'cerveza',   img:'' },
      { sku:'M3', nombre:'CHOCOLATE SUBLIME',   precio:3.50,  vendidos:120, categoria:'chocolate', img:'' },
      { sku:'M4', nombre:'ARROZ COSTENO 5KG',   precio:28.90, vendidos:65,  categoria:'abarrotes', img:'' },
      { sku:'M5', nombre:'ACEITE PRIMOR 1L',    precio:12.50, vendidos:70,  categoria:'aderezos',  img:'' },
      { sku:'M6', nombre:'LECHE GLORIA 1L',     precio:5.20,  vendidos:55,  categoria:'lacteos',   img:'' },
      { sku:'M7', nombre:'PAN FRANCES x10',     precio:3.00,  vendidos:88,  categoria:'panaderia', img:'' }
    ];
  }
  function mockTicker() {
    return ['🛒 MOSEXPRESS - abierto todos los dias',
            '💳 PAGA CON YAPE - PLIN - TARJETA',
            '⭐ SIGUENOS @MOSEXPRESS'];
  }
  function mockPlaylists() {
    return [{ rango:[0,24], videoId:'jfKfPfyJRdk', nombre:'RADIO' }];
  }

  /* ===== Producto estrella ===== */
  var estrellaIdx = 0;
  function obtenerEstrellas() {
    if (!PRODUCTOS.length) return [];
    var i, p;
    // Destacados manuales primero
    if (DESTACADOS.length) {
      var destSet = {};
      for (i = 0; i < DESTACADOS.length; i++) destSet[DESTACADOS[i].sku] = true;
      var orden = [];
      for (i = 0; i < DESTACADOS.length; i++) {
        for (var j = 0; j < PRODUCTOS.length; j++) {
          if (PRODUCTOS[j].sku === DESTACADOS[i].sku) { orden.push(PRODUCTOS[j]); break; }
        }
      }
      var resto = [];
      for (i = 0; i < PRODUCTOS.length; i++) {
        p = PRODUCTOS[i];
        if (!destSet[p.sku] && p.vendidos > 0) resto.push(p);
      }
      resto.sort(function (a, b) { return b.vendidos - a.vendidos; });
      return orden.concat(resto.slice(0, 5)).slice(0, 6);
    }
    // Fallback: top vendidos. El endpoint ya los manda ordenados por vendidos.
    var copia = PRODUCTOS.slice();
    copia.sort(function (a, b) { return b.vendidos - a.vendidos; });
    var hayVendidos = false;
    for (i = 0; i < copia.length; i++) { if (copia[i].vendidos > 0) { hayVendidos = true; break; } }
    return hayVendidos ? copia.slice(0, 6) : copia.slice(0, 6);
  }

  function renderEstrella(prod) {
    if (!prod) return;
    var img = document.getElementById('estrellaImg');
    var content = document.getElementById('estrellaContent');
    img.className = img.className + ' swap';
    content.className = content.className + ' swap';
    setTimeout(function () {
      try {
        var c = catOf(prod.categoria);
        if (prod.img) {
          img.className = 'estrella-img';
          img.style.backgroundImage = "url('" + prod.img + "')";
          img.removeAttribute('data-emoji');
          var oldWm = img.querySelector('.cat-watermark');
          if (oldWm) oldWm.parentNode.removeChild(oldWm);
        } else {
          img.className = 'estrella-img no-image';
          img.style.backgroundImage = c.g;
          img.setAttribute('data-emoji', c.e);
          var wm = img.querySelector('.cat-watermark');
          if (!wm) {
            wm = document.createElement('div');
            wm.className = 'cat-watermark';
            img.appendChild(wm);
          }
          wm.innerHTML = textoSeguro(prod.categoria || 'producto');
        }
        document.getElementById('estrellaNombre').innerHTML = textoSeguro(prod.nombre);
        document.getElementById('estrellaDesc').innerHTML = textoSeguro(prod.desc || '');
        document.getElementById('estrellaPrecio').innerHTML = (Number(prod.precio) || 0).toFixed(2);
        document.getElementById('estrellaPedidos').innerHTML = String(prod.vendidos || 0);
      } catch (e) {
        if (window.console) console.error('[RADIO] renderEstrella:', e);
      }
      img.className = img.className.replace(' swap', '');
      content.className = content.className.replace(' swap', '');
    }, 520);
  }

  function rotarEstrella() {
    if (!PRODUCTOS.length) return;
    var lista = obtenerEstrellas();
    if (!lista.length) return;
    estrellaIdx = (estrellaIdx + 1) % lista.length;
    renderEstrella(lista[estrellaIdx]);
  }

  /* ===== Cards laterales ===== */
  var cardsPool = [];
  function renderCards() {
    var estrellas = obtenerEstrellas();
    var ids = {};
    var i;
    for (i = 0; i < estrellas.length; i++) ids[estrellas[i].sku] = true;
    cardsPool = [];
    for (i = 0; i < PRODUCTOS.length; i++) {
      if (!ids[PRODUCTOS[i].sku]) cardsPool.push(PRODUCTOS[i]);
    }
    if (cardsPool.length < 4) cardsPool = PRODUCTOS.slice();
    shuffle(cardsPool);
    var ct = document.getElementById('cards');
    ct.innerHTML = '';
    for (i = 0; i < Math.min(4, cardsPool.length); i++) {
      ct.appendChild(buildCard(cardsPool[i]));
    }
  }
  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
  }
  function buildCard(prod) {
    var c = catOf(prod.categoria);
    var el = document.createElement('div');
    el.className = 'card slide-in';
    var imgHtml;
    if (prod.img) {
      imgHtml = '<div class="card-img" style="background-image:url(\'' + prod.img + '\')"></div>';
    } else {
      imgHtml = '<div class="card-img no-image" data-emoji="' + c.e + '" style="background:' + c.g + '"></div>';
    }
    el.innerHTML = imgHtml +
      '<div class="card-info">' +
        '<div class="card-nombre">' + textoSeguro(prod.nombre) + '</div>' +
        '<div class="card-desc">' + textoSeguro(prod.categoria || '') + '</div>' +
        '<div class="card-precio">S/ ' + (Number(prod.precio) || 0).toFixed(2) + '</div>' +
      '</div>';
    return el;
  }
  function rotarCards() {
    var ct = document.getElementById('cards');
    var first = ct.firstChild;
    if (!first || cardsPool.length < 5) { renderCards(); return; }
    first.className = 'card slide-out';
    setTimeout(function () {
      if (first.parentNode) first.parentNode.removeChild(first);
      var moved = cardsPool.shift();
      cardsPool.push(moved);
      var nuevo = cardsPool[3] || cardsPool[cardsPool.length - 1];
      ct.appendChild(buildCard(nuevo));
    }, 480);
  }

  /* ===== Reloj ===== */
  function tickClock() {
    var d = new Date();
    var h = d.getHours(), m = d.getMinutes();
    var hh = (h < 10 ? '0' : '') + h;
    var mm = (m < 10 ? '0' : '') + m;
    document.getElementById('clock').innerHTML = hh + ':' + mm;
  }

  /* ===== Playlist por horario + reproductor YouTube ===== */
  var playerCurrentVideo = null;
  var audioUnlocked = false;
  function getPlaylistByHour() {
    var h = new Date().getHours();
    for (var i = 0; i < PLAYLISTS.length; i++) {
      var pl = PLAYLISTS[i];
      if (pl.rango && h >= pl.rango[0] && h < pl.rango[1]) return pl;
    }
    return PLAYLISTS[0] || null;
  }
  function mountYTPlayer() {
    var pl = getPlaylistByHour();
    if (!pl || pl.videoId === playerCurrentVideo) return;
    playerCurrentVideo = pl.videoId;
    var mute = audioUnlocked ? 0 : 1;
    document.getElementById('ytplayer').src =
      'https://www.youtube.com/embed/' + pl.videoId +
      '?autoplay=1&controls=0&list=RD' + pl.videoId +
      '&modestbranding=1&mute=' + mute + '&enablejsapi=1';
    document.getElementById('playlistTag').innerHTML = '♪ ' + textoSeguro(pl.nombre || '');
    document.getElementById('npTitle').innerHTML = textoSeguro(pl.nombre || 'MosExpress Radio');
  }
  function ytCmd(func, args) {
    var iframe = document.getElementById('ytplayer');
    if (!iframe || !iframe.contentWindow) return;
    try {
      iframe.contentWindow.postMessage(
        JSON.stringify({ event: 'command', func: func, args: args || [] }), '*');
    } catch (e) {}
  }
  function unlockAudio() {
    if (audioUnlocked) return;
    audioUnlocked = true;
    ytCmd('unMute');
    ytCmd('setVolume', [80]);
    ytCmd('playVideo');
    var chip = document.getElementById('audioChip');
    chip.className = chip.className + ' hidden';
  }

  /* ===== Ticker ===== */
  function renderTicker() {
    var items = TICKER.concat(TICKER);
    var html = '';
    for (var i = 0; i < items.length; i++) {
      if (i > 0) html += '<span class="ticker-item dot">&bull;</span>';
      html += '<span class="ticker-item">' + textoSeguro(items[i]) + '</span>';
    }
    document.getElementById('tickerTrack').innerHTML = html;
  }

  /* ===== Partículas (pocas, livianas) ===== */
  function spawnParticles() {
    var ct = document.getElementById('particles');
    for (var i = 0; i < 12; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (Math.random() * 100) + 'vw';
      p.style.webkitAnimationDelay = (Math.random() * 12) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      ct.appendChild(p);
    }
  }

  /* ===== Loading ===== */
  function setLoadingMsg(msg) { document.getElementById('loadingMsg').innerHTML = msg; }
  function hideLoading() {
    setTimeout(function () {
      var ls = document.getElementById('loadingScreen');
      ls.className = ls.className + ' hidden';
    }, 300);
  }

  /* ===== Auto-update: detecta nueva versión y recarga con efecto ===== */
  var initialVersion = null;
  var updating = false;
  function checkForUpdate() {
    xhrGet('version.json?t=' + (new Date().getTime()), function (v) {
      if (initialVersion === null) { initialVersion = v.version; return; }
      if (v.version !== initialVersion && !updating) triggerUpdate(v.version);
    }, function () {});
  }
  function triggerUpdate(newVer) {
    updating = true;
    document.getElementById('updateVer').innerHTML = textoSeguro(newVer);
    var ov = document.getElementById('updateOverlay');
    ov.className = ov.className + ' show';
    setTimeout(function () {
      try {
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            for (var i = 0; i < keys.length; i++) {
              if (keys[i].indexOf('mosexpress') === 0) caches.delete(keys[i]);
            }
          });
        }
      } catch (e) {}
      window.location.href = window.location.pathname + '?v=' + (new Date().getTime());
    }, 3300);
  }

  /* ===== Util: escapar texto para innerHTML ===== */
  function textoSeguro(s) {
    s = String(s == null ? '' : s);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ===== Arranque del render + intervalos ===== */
  function arrancar() {
    setLoadingMsg('Listo!');
    renderTicker();
    renderCards();
    var est = obtenerEstrellas();
    if (est.length) renderEstrella(est[0]);
    mountYTPlayer();
    hideLoading();

    setInterval(rotarEstrella, (CONFIG.rotarEstrellaSeg || 12) * 1000);
    setInterval(rotarCards,    (CONFIG.rotarCardsSeg    || 7)  * 1000);
    setInterval(mountYTPlayer, 60000);
    setInterval(refrescarData, 5 * 60 * 1000);
  }

  /* ===== Init ===== */
  function init() {
    spawnParticles();
    tickClock();
    setInterval(tickClock, 1000);

    // Cualquier interacción (tecla del control remoto, click, touch) activa el audio
    var evs = ['click', 'touchstart', 'keydown', 'mousedown'];
    for (var i = 0; i < evs.length; i++) {
      document.addEventListener(evs[i], unlockAudio, false);
    }

    cargarData();

    // Chequeo de versión: a los 30s y luego cada 90s
    setTimeout(checkForUpdate, 30000);
    setInterval(checkForUpdate, 90000);

    // Service Worker (si el navegador lo soporta; los viejos lo ignoran)
    if ('serviceWorker' in navigator) {
      try { navigator.serviceWorker.register('sw.js'); } catch (e) {}
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init, false);
  } else {
    init();
  }
})();
</script>
</body>
